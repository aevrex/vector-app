{{define "content"}}
<main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
    <section class="rounded-3xl bg-[#13322b] p-8 text-[#fafaf8]">
        <p class="text-sm font-semibold text-[#97d700]">Administration</p>
        <h1 class="mt-2 text-3xl font-semibold leading-tight sm:text-4xl">Users</h1>
        <p class="mt-3 max-w-3xl text-base font-light text-[#eeece8]">Manage who can access Vector and what role they have. You cannot change your own role.</p>
    </section>

    <section class="mt-6 rounded-2xl border border-[#e0ddd7] bg-white p-6 shadow-sm">
        <table class="w-full border-collapse text-left">
            <thead>
                <tr class="border-b border-[#c7c5bc]">
                    <th class="px-3 py-2 text-sm font-semibold text-[#1c1c1a]">Email</th>
                    <th class="px-3 py-2 text-sm font-semibold text-[#1c1c1a]">Role</th>
                </tr>
            </thead>
            <tbody>
                {{range .Rows}}{{template "user_row" .}}{{end}}
            </tbody>
        </table>
    </section>
</main>
{{end}}

{{define "user_row"}}
<tr class="border-b border-[#e3e1da]">
    <td class="px-3 py-2 text-sm text-[#1c1c1a]">{{.U.Email}}</td>
    <td class="px-3 py-2 text-sm text-[#1c1c1a]">
        {{if .Self}}
            {{.U.Role}} <span class="font-semibold text-[#828078]">(you)</span>
        {{else}}
            <select
                name="role"
                hx-post="/admin/role"
                hx-vals='{"id": "{{.U.ID}}"}'
                hx-target="closest tr"
                hx-swap="outerHTML"
                class="h-10 w-32 rounded-xl border border-[#c7c5bc] bg-white px-3 text-sm text-[#1c1c1a] shadow-sm outline-none focus:border-[#007a33] focus:ring-2 focus:ring-[#97d700]">
                <option value="user" {{if eq .U.Role "user"}}selected{{end}}>user</option>
                <option value="admin" {{if eq .U.Role "admin"}}selected{{end}}>admin</option>
            </select>
        {{end}}
    </td>
</tr>
{{end}}
