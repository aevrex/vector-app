{{define "content"}}
<main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
    <section class="rounded-lg bg-[#13322b] p-6 text-[#fafaf8] shadow-lg shadow-[#13322b]/15">
        <div class="flex flex-col gap-5 lg:flex-row lg:items-end lg:justify-between">
            <div>
                <p class="text-sm font-bold text-[#97d700]">Browse</p>
                <h1 class="mt-2 text-3xl font-black leading-tight sm:text-4xl">{{.Title}}</h1>
                <p class="mt-3 max-w-3xl text-base text-[#e6fcd4]">Reusable team templates in one place, with room for process notes and internal knowledge as Vector grows.</p>
            </div>
            <a href="/manage" class="inline-flex h-11 items-center justify-center rounded-md bg-[#fde021] px-4 text-sm font-black text-[#13322b] no-underline shadow-sm transition hover:bg-[#fffed3] focus:outline-none focus:ring-2 focus:ring-[#97d700] focus:ring-offset-2 focus:ring-offset-[#13322b]">
                Manage Templates
            </a>
        </div>
    </section>

    <div class="mt-6 grid gap-6 lg:grid-cols-[22rem_minmax(0,1fr)]">
        <section class="rounded-lg border border-[#c7c5bc] bg-[#fafaf8] p-5 shadow-sm">
            <div>
                <h2 class="text-lg font-black text-[#13322b]">Filters</h2>
                <p class="mt-1 text-sm font-medium text-[#575652]">Department, group, and set</p>
            </div>

            <div class="mt-5 space-y-4">
                <div>
                    <label for="department" class="mb-1 block text-sm font-bold text-[#31312e]">Department</label>
                    <select
                        id="department"
                        name="department"
                        class="block h-11 w-full rounded-md border border-[#c7c5bc] bg-white px-3 text-sm font-medium text-[#1c1c1a] shadow-sm outline-none focus:border-[#007a33] focus:ring-2 focus:ring-[#97d700]"
                        hx-get="/groups"
                        hx-target="#group-container"
                        hx-trigger="change">
                        <option value="">Choose a department</option>
                        {{range .Departments}}
                            <option value="{{.}}">{{.}}</option>
                        {{end}}
                    </select>
                </div>

                <div id="group-container"></div>
                <div id="set-container"></div>
            </div>
        </section>

        <section class="rounded-lg border border-[#c7c5bc] bg-[#fafaf8] p-5 shadow-sm">
            <div>
                <h2 class="text-lg font-black text-[#13322b]">Templates</h2>
                <p class="mt-1 text-sm font-medium text-[#575652]">Ready-to-copy content for the selected set</p>
            </div>

            <div class="mt-5">
                <div id="templates-container">
                    <p class="rounded-lg border border-dashed border-[#c7c5bc] bg-[#eeece8] p-4 text-sm font-semibold text-[#575652]">No set selected.</p>
                </div>
            </div>
        </section>
    </div>
</main>
{{end}}
