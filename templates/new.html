{{define "content"}}
<main class="mt-5 space-y-5">
    <section class="border border-[#d8eadf] bg-white p-6 shadow-sm">
        <p class="text-xs font-bold uppercase tracking-[0.22em] text-[#00a651]">Template operations</p>
        <h2 class="mt-2 text-3xl font-semibold tracking-tight text-[#111827]">{{.Title}}</h2>
        <p class="mt-2 text-sm text-[#4b5563]">Create a template path and save the template content into Vector.</p>
    </section>

    {{if .Saved}}
        <p class="border border-[#b7edc9] bg-[#eaf8ef] p-3 text-sm font-semibold text-[#006b3a] shadow-sm">Template saved.</p>
    {{end}}

    {{if .Error}}
        <p class="border border-[#ffd200] bg-[#fff8cc] p-3 text-sm font-semibold text-[#5f4a00] shadow-sm">{{.Error}}</p>
    {{end}}

    <form method="POST" action="/templates" class="border border-[#d8eadf] bg-white p-6 shadow-sm">
        <div class="grid gap-5 lg:grid-cols-3">
        <div>
            <label for="department" class="mb-1 block text-sm font-semibold text-[#374151]">Department</label>
            <select
                id="department"
                name="department"
                class="block h-10 w-full border border-[#cfe6d7] bg-[#fbfefc] px-3 text-sm text-[#111827] shadow-xs outline-none focus:border-[#00a651] focus:ring-2 focus:ring-[#b7edc9]"
                hx-get="/new/groups"
                hx-target="#new-group-container"
                hx-trigger="change">
                <option value="">Choose a department</option>
                {{range .Departments}}
                    <option value="{{.}}">{{.}}</option>
                {{end}}
            </select>
            <input
                type="text"
                name="department_new"
                value="{{.Values.NewDepartment}}"
                class="mt-2 block h-10 w-full border border-[#cfe6d7] bg-[#fbfefc] px-3 text-sm text-[#111827] shadow-xs outline-none placeholder:text-[#6b7280] focus:border-[#00a651] focus:ring-2 focus:ring-[#b7edc9]"
                placeholder="Or type a new department">
        </div>

        <div id="new-group-container">
            <label for="group" class="mb-1 block text-sm font-semibold text-[#374151]">Group</label>
            <select id="group" name="group" class="block h-10 w-full border border-[#cfe6d7] bg-[#fbfefc] px-3 text-sm text-[#111827] shadow-xs outline-none focus:border-[#00a651] focus:ring-2 focus:ring-[#b7edc9]">
                <option value="">Choose a group</option>
            </select>
            <input
                type="text"
                name="group_new"
                value="{{.Values.NewGroup}}"
                class="mt-2 block h-10 w-full border border-[#cfe6d7] bg-[#fbfefc] px-3 text-sm text-[#111827] shadow-xs outline-none placeholder:text-[#6b7280] focus:border-[#00a651] focus:ring-2 focus:ring-[#b7edc9]"
                placeholder="Or type a new group">
        </div>

        <div id="new-set-container">
            <label for="set" class="mb-1 block text-sm font-semibold text-[#374151]">Set</label>
            <select id="set" name="set" class="block h-10 w-full border border-[#cfe6d7] bg-[#fbfefc] px-3 text-sm text-[#111827] shadow-xs outline-none focus:border-[#00a651] focus:ring-2 focus:ring-[#b7edc9]">
                <option value="">Choose a set</option>
            </select>
            <input
                type="text"
                name="set_new"
                value="{{.Values.NewSet}}"
                class="mt-2 block h-10 w-full border border-[#cfe6d7] bg-[#fbfefc] px-3 text-sm text-[#111827] shadow-xs outline-none placeholder:text-[#6b7280] focus:border-[#00a651] focus:ring-2 focus:ring-[#b7edc9]"
                placeholder="Or type a new set">
        </div>
        </div>

        <div class="mt-5">
            <label for="title" class="mb-1 block text-sm font-semibold text-[#374151]">Title</label>
            <input
                id="title"
                type="text"
                name="title"
                value="{{.Values.Title}}"
                class="block h-10 w-full border border-[#cfe6d7] bg-[#fbfefc] px-3 text-sm text-[#111827] shadow-xs outline-none focus:border-[#00a651] focus:ring-2 focus:ring-[#b7edc9]">
        </div>

        <div class="mt-5">
            <label for="body" class="mb-1 block text-sm font-semibold text-[#374151]">Body</label>
            <textarea
                id="body"
                name="body"
                rows="6"
                class="block w-full border border-[#cfe6d7] bg-[#fbfefc] px-3 py-2 text-sm text-[#111827] shadow-xs outline-none focus:border-[#00a651] focus:ring-2 focus:ring-[#b7edc9]">{{.Values.Body}}</textarea>
        </div>

        <button type="submit" class="mt-6 block w-full bg-[#00a651] px-4 py-3 text-sm font-bold text-white shadow-sm hover:bg-[#008a45] focus:outline-none focus:ring-2 focus:ring-[#b7edc9]">Save Template</button>
    </form>
</main>
{{end}}
