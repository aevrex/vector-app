{{define "groups.html"}}
<label for="group" class="mb-1 block text-sm font-medium text-[#31312e]">Group</label>
<select
    id="group"
    name="group"
    class="block h-11 w-full rounded-xl border border-[#c7c5bc] bg-white px-3 text-sm text-[#1c1c1a] shadow-sm outline-none focus:border-[#007a33] focus:ring-2 focus:ring-[#97d700]"
    hx-get="/sets"
    hx-target="#set-container"
    hx-trigger="change"
    hx-include="#department, #group">
    <option value="">Choose a group</option>
    {{range .Groups}}
        <option value="{{.}}">{{.}}</option>
    {{end}}
</select>

<div id="set-container" hx-swap-oob="true"></div>
<div id="templates-container" hx-swap-oob="true"></div>
{{end}}
