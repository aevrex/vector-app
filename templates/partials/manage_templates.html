{{define "manage_templates.html"}}
<div id="manage-template-list">
    {{if .Templates}}
        <div class="space-y-3">
            {{range .Templates}}
                <article class="rounded-2xl border border-[#e0ddd7] bg-[#fafaf8] p-4 shadow-sm">
                    <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
                        <div class="min-w-0">
                            <p class="text-xs font-semibold text-[#007a33]">{{.Department}} / {{.Group}} / {{.Set}}</p>
                            <h3 class="mt-1 text-base font-semibold text-[#1c1c1a]">{{.Title}}</h3>
                        </div>

                        <div class="flex shrink-0 flex-wrap gap-2">
                            <button
                                type="button"
                                class="inline-flex h-9 items-center justify-center rounded-full bg-[#007a33] px-4 text-xs font-semibold text-white shadow-sm transition hover:bg-[#006341] focus:outline-none focus-visible:ring-2 focus-visible:ring-[#007a33] focus-visible:ring-offset-2"
                                onclick="navigator.clipboard.writeText(document.getElementById('manage-template-body-{{.ID}}').value)">
                                Copy
                            </button>

                            <form method="POST" action="/templates/{{.ID}}/delete" onsubmit="return confirm('Delete this template permanently?')">
                                <button
                                    type="submit"
                                    class="inline-flex h-9 items-center justify-center rounded-full bg-[#ad1d1a] px-4 text-xs font-semibold text-white shadow-sm transition hover:bg-[#810804] focus:outline-none focus-visible:ring-2 focus-visible:ring-[#ad1d1a] focus-visible:ring-offset-2"
                                    hx-delete="/templates/{{.ID}}?q={{$.SearchQuery}}"
                                    hx-target="#manage-template-list"
                                    hx-swap="outerHTML"
                                    hx-confirm="Delete this template permanently?">
                                    Delete
                                </button>
                            </form>
                        </div>
                    </div>

                    <textarea
                        id="manage-template-body-{{.ID}}"
                        readonly
                        class="mt-3 block min-h-28 w-full resize-none overflow-hidden rounded-xl border border-[#e0ddd7] bg-white px-3 py-3 text-sm leading-6 text-[#41403c] outline-none [field-sizing:content] focus:border-[#007a33] focus:ring-2 focus:ring-[#97d700]"
                    >{{.Body}}</textarea>
                </article>
            {{end}}
        </div>
    {{else}}
        {{if .SearchQuery}}
            <p class="rounded-xl border border-dashed border-[#c7c5bc] bg-[#eeece8] p-4 text-sm font-medium text-[#575652]">No templates match "{{.SearchQuery}}".</p>
        {{else}}
            <p class="rounded-xl border border-dashed border-[#c7c5bc] bg-[#eeece8] p-4 text-sm font-medium text-[#575652]">No templates have been created yet.</p>
        {{end}}
    {{end}}
</div>
{{end}}
