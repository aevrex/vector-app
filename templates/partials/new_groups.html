{{define "new_groups.html"}}
<label for="group" class="mb-1 block text-sm font-semibold text-[#374151]">Group</label>
<select
    id="group"
    name="group"
    class="block h-10 w-full border border-[#cfe6d7] bg-[#fbfefc] px-3 text-sm text-[#111827] shadow-xs outline-none focus:border-[#00a651] focus:ring-2 focus:ring-[#b7edc9]"
    hx-get="/new/sets"
    hx-target="#new-set-container"
    hx-trigger="change"
    hx-include="#department, #group">
    <option value="">Choose a group</option>
    {{range .Groups}}
        <option value="{{.}}">{{.}}</option>
    {{end}}
</select>
<input
    type="text"
    name="group_new"
    class="mt-2 block h-10 w-full border border-[#cfe6d7] bg-[#fbfefc] px-3 text-sm text-[#111827] shadow-xs outline-none placeholder:text-[#6b7280] focus:border-[#00a651] focus:ring-2 focus:ring-[#b7edc9]"
    placeholder="Or type a new group">

<div id="new-set-container" hx-swap-oob="true">
    <label for="set" class="mb-1 block text-sm font-semibold text-[#374151]">Set</label>
    <select id="set" name="set" class="block h-10 w-full border border-[#cfe6d7] bg-[#fbfefc] px-3 text-sm text-[#111827] shadow-xs outline-none focus:border-[#00a651] focus:ring-2 focus:ring-[#b7edc9]">
        <option value="">Choose a set</option>
    </select>
    <input
        type="text"
        name="set_new"
        class="mt-2 block h-10 w-full border border-[#cfe6d7] bg-[#fbfefc] px-3 text-sm text-[#111827] shadow-xs outline-none placeholder:text-[#6b7280] focus:border-[#00a651] focus:ring-2 focus:ring-[#b7edc9]"
        placeholder="Or type a new set">
</div>
{{end}}
