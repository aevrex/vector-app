{{define "sets.html"}}
<label for="set" class="mb-1 block text-sm font-medium text-[#31312e]">Set</label>
<select
    id="set"
    name="set"
    class="block h-11 w-full rounded-xl border border-[#c7c5bc] bg-white px-3 text-sm text-[#1c1c1a] shadow-sm outline-none focus:border-[#007a33] focus:ring-2 focus:ring-[#97d700]"
    hx-get="/templates"
    hx-target="#templates-container"
    hx-trigger="change"
    hx-include="#department, #group, #set">
    <option value="">Choose a set</option>
    {{range .Sets}}
        <option value="{{.}}">{{.}}</option>
    {{end}}
</select>

<div id="templates-container" hx-swap-oob="true"></div>
{{end}}
