{{define "templates.html"}}
{{if .Templates}}
    <div class="space-y-3">
        {{range .Templates}}
            <article class="rounded-2xl border border-[#e0ddd7] bg-[#fafaf8] p-4 shadow-sm">
                <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
                    <div class="min-w-0">
                        <p class="text-xs font-semibold text-[#007a33]">{{.Department}} / {{.Group}} / {{.Set}}</p>
                        <h3 class="mt-1 text-base font-semibold text-[#1c1c1a]">{{.Title}}</h3>
                    </div>

                    <button
                        type="button"
                        class="inline-flex h-9 shrink-0 items-center justify-center rounded-full bg-[#007a33] px-4 text-xs font-semibold text-white shadow-sm transition hover:bg-[#006341] focus:outline-none focus-visible:ring-2 focus-visible:ring-[#007a33] focus-visible:ring-offset-2"
                        onclick="navigator.clipboard.writeText(document.getElementById('template-body-{{.ID}}').value)">
                        Copy
                    </button>
                </div>

                <textarea
                    id="template-body-{{.ID}}"
                    readonly
                    class="mt-3 block min-h-36 w-full resize-none overflow-hidden rounded-xl border border-[#e0ddd7] bg-white px-3 py-3 text-sm leading-6 text-[#41403c] outline-none [field-sizing:content] focus:border-[#007a33] focus:ring-2 focus:ring-[#97d700]"
                >{{.Body}}</textarea>
            </article>
        {{end}}
    </div>
{{else}}
    <p class="rounded-xl border border-dashed border-[#c7c5bc] bg-[#eeece8] p-4 text-sm font-medium text-[#575652]">No templates found.</p>
{{end}}
{{end}}
