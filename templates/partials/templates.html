{{define "templates.html"}}
{{if .Templates}}
    <div class="space-y-3">
        {{range .Templates}}
            <article class="border border-[#d8eadf] bg-[#fbfefc] p-4 shadow-xs">
                <div class="flex items-start justify-between gap-4">
                    <h3 class="text-sm font-bold text-[#111827]">{{.Title}}</h3>

                    <button
                        type="button"
                        class="bg-[#00a651] px-3 py-2 text-xs font-bold text-white shadow-sm hover:bg-[#008a45]"
                        onclick="navigator.clipboard.writeText(document.getElementById('template-body-{{.ID}}').innerText)">
                        Copy
                    </button>
                </div>

                <textarea
                    id="template-body-{{.ID}}"
                    readonly
                    class="mt-3 block min-h-40 w-full resize-none overflow-hidden border border-[#d8eadf] bg-[#ffffff] px-4 py-3 font-sans text-sm leading-6 text-[#374151] outline-none [field-sizing:content] focus:border-[#00a651] focus:ring-2 focus:ring-[#b7edc9]"
                >{{.Body}}</textarea>
            </article>
        {{end}}
    </div>
{{else}}
    <p class="border border-dashed border-[#cfe6d7] bg-[#fbfefc] p-4 text-sm text-[#4b5563]">No templates found.</p>
{{end}}
{{end}}
